<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnlyFeet – Sensor Data Viewer</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/three@0.137.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.137.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/madgwick.js"></script>
  <style>
    #device-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 9999;
      align-items: center; justify-content: center;
    }
    #device-modal-overlay.open { display: flex; }
    #device-modal {
      background: #12122a; border: 1px solid #333360; border-radius: 8px;
      padding: 24px; min-width: 360px; max-width: 90vw; max-height: 80vh;
      overflow-y: auto; color: #ccc; font-family: monospace;
    }
    #device-modal h2 { margin: 0 0 16px; color: #fff; font-size: 1em; }
    #device-session-list { list-style: none; padding: 0; margin: 0 0 16px; }
    #device-session-list li {
      padding: 10px 14px; margin-bottom: 6px; cursor: pointer;
      border: 1px solid #333; border-radius: 4px; background: #1a1a3a;
    }
    #device-session-list li:hover { background: #2a2a5a; border-color: #5555aa; }
    #device-session-list li .sess-name { color: #aad; font-weight: bold; }
    #device-session-list li .sess-info { color: #888; font-size: 0.85em; margin-top: 2px; }
    #device-modal-close {
      float: right; background: none; border: 1px solid #555; color: #aaa;
      padding: 4px 10px; cursor: pointer; border-radius: 4px; font-size: 0.85em;
    }
    #device-modal-close:hover { background: #333; }
    #device-modal-status { color: #888; font-size: 0.85em; margin-top: 8px; }
    .btn-device { background: #2a2a6a; border: 1px solid #4444aa; color: #aad;
      padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
    .btn-device:hover { background: #3a3a8a; }
  </style>
</head>
<body>
  <header id="header">
    <label id="folder-label">
      <span class="btn">Foot-Daten laden</span>
      <input type="file" id="folder-input" webkitdirectory multiple hidden>
    </label>
    <label id="phone-folder-label" class="disabled">
      <span class="btn btn-secondary">Phone-Daten laden</span>
      <input type="file" id="phone-folder-input" webkitdirectory multiple hidden disabled>
    </label>
    <button class="btn-device" id="btn-load-device">Von Gerät laden</button>
    <span id="session-info">No session loaded</span>
    <span id="sync-info"></span>
    <span id="session-health"></span>
  </header>

  <!-- Device session modal -->
  <div id="device-modal-overlay">
    <div id="device-modal">
      <button id="device-modal-close">✕ Schließen</button>
      <h2>Session vom Gerät laden</h2>
      <ul id="device-session-list"></ul>
      <div id="device-modal-status"></div>
    </div>
  </div>

  <main id="grid">
    <section id="camera-panel" class="panel">
      <h3>Camera</h3>
      <div class="panel-content">
        <img id="camera-img" alt="No image">
        <span id="camera-label" style="display:block;text-align:center;font-size:0.75em;color:#aaa;margin-top:2px;"></span>
      </div>
    </section>

    <section id="imu-orient-panel" class="panel">
      <h3 id="imu-orient-title">IMU 3D Orientation</h3>
      <div class="panel-content">
        <div id="imu-orient-container"></div>
        <div id="gps-map-container" style="display:none;">
          <div id="map-speed-overlay" style="position:absolute; top:10px; right:10px; z-index:1000; background:rgba(0,0,0,0.6); color:#fff; padding:4px 8px; border-radius:4px; font-family:monospace; font-size:14px; pointer-events:none; border:1px solid rgba(255,255,255,0.2);">0.0 km/h</div>
        </div>
      </div>
    </section>

    <section id="tof-panel" class="panel">
      <h3>ToF Heightmap</h3>
      <div class="panel-content" id="tof-container"></div>
    </section>

    <section id="accel-panel" class="panel chart-panel">
      <h3>Accelerometer</h3>
      <div class="panel-content">
        <canvas id="accel-chart"></canvas>
        <div class="chart-cursor"></div>
      </div>
    </section>

    <section id="gyro-panel" class="panel chart-panel">
      <h3>Gyroscope</h3>
      <div class="panel-content">
        <canvas id="gyro-chart"></canvas>
        <div class="chart-cursor"></div>
      </div>
    </section>

    <section id="mag-panel" class="panel chart-panel">
      <h3>Magnetometer</h3>
      <div class="panel-content">
        <canvas id="mag-chart"></canvas>
        <div class="chart-cursor"></div>
      </div>
    </section>

    <section id="audio-waveforms-panel" class="panel" style="grid-column: span 3;">
      <h3>Audio Waveforms (Foot <span style="color:#e94560">■</span> / Phone <span style="color:#36a2eb">■</span>)</h3>
      <div class="panel-content">
        <div id="audio-waveforms-content">
          <div class="wf-info-row"><span id="wf-info" class="wf-info">—</span></div>
          <div class="wf-canvas-wrap">
            <canvas id="wf-canvas"></canvas>
            <div id="wf-cursor"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer id="transport">
    <div id="transport-buttons">
      <button id="btn-prev" title="Previous packet">&#9664;&#9664;</button>
      <button id="btn-play" title="Play / Pause">&#9654; Play</button>
      <button id="btn-next" title="Next packet">&#9654;&#9654;</button>
    </div>
    <input type="range" id="timeline-slider" min="0" max="0" value="0" step="1">
    <span id="time-display">0:00 / 0:00</span>
    <div id="transport-extras">
      <label>Speed:
        <select id="speed-select">
          <option value="0.5">0.5×</option>
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
          <option value="4">4×</option>
        </select>
      </label>
      <label>Volume:
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8">
      </label>
    </div>
  </footer>

  <script src="js/data-loader.js"></script>
  <script src="js/phone-loader.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/tof-view.js"></script>
  <script src="js/imu-charts.js"></script>
  <script src="js/imu-orientation.js"></script>
  <script src="js/gps-map.js"></script>
  <script src="js/audio-waveforms.js"></script>
  <script src="js/audio-player.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
