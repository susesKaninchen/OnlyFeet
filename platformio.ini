; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
data_dir = data

[env:xiao_esp32s3_sense]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.10/platform-espressif32.zip
board                   = seeed_xiao_esp32s3
framework               = arduino
monitor_speed           = 115200
build_src_filter        = -<*> +<main.cpp>
board_build.partitions  = partitions.csv
board_build.filesystem  = littlefs
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCAMERA_MODEL_XIAO_ESP32S3
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
lib_deps =
  espressif/esp32-camera
  bblanchon/ArduinoJson@^7.1.0
  wollewald/ICM20948_WE
  sparkfun/SparkFun VL53L5CX Arduino Library@^1.0.3

; ── Legacy-Hardware-Build ────────────────────────────────────────────────────
; ICM20948 über I2C (0x68) + VL53L1X Einzelpunkt-ToF.
; Gleiche FreeRTOS-Architektur wie Hauptbuild — nur Sensor-Anbindung anders.
[env:xiao_esp32s3_sense_legacy]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.10/platform-espressif32.zip
board             = seeed_xiao_esp32s3
framework         = arduino
monitor_speed     = 115200
build_src_filter        = -<*> +<main_legacy.cpp>
board_build.partitions  = partitions.csv
board_build.filesystem  = littlefs
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCAMERA_MODEL_XIAO_ESP32S3
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
lib_deps =
  espressif/esp32-camera
  bblanchon/ArduinoJson@^7.1.0
  wollewald/ICM20948_WE
  pololu/VL53L1X

